backend:
  name: git-gateway
  branch: main # Hoặc branch bạn đang sử dụng

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # --- MỤC SẢN PHẨM (TIẾNG VIỆT) ---
  - name: "products_vi"
    label: "Sản phẩm (VN)"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - {
          label: "Danh mục",
          name: "category",
          widget: "select",
          options: ["Yến tinh chế", "Yến sơ chế", "Nước yến", "Quà tặng"],
        }
      - { label: "Giá", name: "price", widget: "string" }
      - { label: "Trọng lượng", name: "weight", widget: "string" }
      - { label: "Thành phần", name: "ingredients", widget: "string" }
      - { label: "Cách dùng", name: "usage", widget: "text" }
      - { label: "Chứng nhận", name: "certification", widget: "string" }
      - { label: "Hình ảnh", name: "image", widget: "image" }
      - { label: "Mô tả ngắn", name: "description", widget: "text" }
      - {
          label: "Đánh giá (1-5)",
          name: "rating",
          widget: "number",
          default: 5,
        }
      - { label: "Mã SKU", name: "sku", widget: "string" }
      - { label: "Nội dung chi tiết", name: "body", widget: "markdown" }

  # --- MỤC SẢN PHẨM (TIẾNG TRUNG) ---
  - name: "products_zh"
    label: "Sản phẩm (ZH)"
    folder: "src/content/zh-products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề (中文)", name: "title", widget: "string" }
      - {
          label: "Danh mục (分类)",
          name: "category",
          widget: "select",
          options: ["原味燕盏", "精制燕窝", "即食燕窝", "燕窝礼盒"],
        }
      - { label: "Giá (价格)", name: "price", widget: "string" }
      - { label: "Trọng lượng (重量)", name: "weight", widget: "string" }
      - { label: "Thành phần (成分)", name: "ingredients", widget: "string" }
      - { label: "Cách dùng (用法)", name: "usage", widget: "text" }
      - { label: "Chứng nhận (认证)", name: "certification", widget: "string" }
      - { label: "Hình ảnh (图片)", name: "image", widget: "image" }
      - { label: "Mô tả ngắn (简短描述)", name: "description", widget: "text" }
      - {
          label: "Đánh giá (1-5) (评价)",
          name: "rating",
          widget: "number",
          default: 5,
        }
      - { label: "Mã SKU", name: "sku", widget: "string" }
      - {
          label: "Nội dung chi tiết (内容详情)",
          name: "body",
          widget: "markdown",
        }

  # --- MỤC KIẾN THỨC (TIẾNG VIỆT) ---
  - name: "blog_vi"
    label: "Kiến thức (VN)"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề bài viết", name: "title", widget: "string" }
      - {
          label: "Danh mục",
          name: "category",
          widget: "select",
          options: ["Cách chưng yến", "Phân biệt yến", "Giá trị dinh dưỡng"],
        }
      - { label: "Ngày đăng", name: "pubDate", widget: "datetime" }
      - { label: "Mô tả", name: "description", widget: "string" }
      - { label: "Ảnh bìa", name: "image", widget: "image" }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }

  # --- MỤC KIẾN THỨC (TIẾNG TRUNG) ---
  - name: "blog_zh"
    label: "Kiến thức (ZH)"
    folder: "src/content/zh-blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Tiêu đề bài viết (文章标题)",
          name: "title",
          widget: "string",
        }
      - {
          label: "Danh mục (分类)",
          name: "category",
          widget: "select",
          options: ["燕窝做法", "真假辨别", "营养价值"],
        }
      - { label: "Ngày đăng (发布日期)", name: "pubDate", widget: "datetime" }
      - { label: "Mô tả (描述)", name: "description", widget: "string" }
      - { label: "Ảnh bìa (封面图片)", name: "image", widget: "image" }
      - {
          label: "Nội dung bài viết (文章内容)",
          name: "body",
          widget: "markdown",
        }
